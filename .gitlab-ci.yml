# Typst Project | CI/CD Configuration
default:
  image: ${CI_REGISTRY_IMAGE}:latest
  tags:
    - docker

variables:
  NIX_CONFIG: "experimental-features = nix-command flakes" # Enable flakes

stages:
  - deploy
  - lint
  - build


# Build and deploy the development docker image
build-image:
  stage: deploy
  image: nixos/nix:latest
  rules:
    - changes:
      - flake.nix
      - flake.lock
  script:
    - echo "> Generating the development docker image..."
    - |+
      nix build .#devImage
      mkdir -p image
      cp result image/${CI_PROJECT_NAME}.tar.gz
  artifacts:
    paths:
      - image/${CI_PROJECT_NAME}.tar.gz
    expire_in: 1 hour

push-image:
  stage: deploy
  needs: ["build-image"]
  image: docker:20.10.18
  services:
    - name: docker:20.10.18-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  rules:
    - changes:
      - flake.nix
      - flake.lock
  script:
    - echo "> Pushing and tagging image in the registry..."
    - |+
      docker load < image/${CI_PROJECT_NAME}.tar.gz
      docker tag typst-dev:latest ${CI_REGISTRY_IMAGE}:${CI_COMMIT_TAG}
      docker tag typst-dev:latest ${CI_REGISTRY_IMAGE}:latest
      # Login and push the image.
      docker login -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${CI_REGISTRY}
      docker push ${CI_REGISTRY_IMAGE}:${CI_COMMIT_TAG}
      docker push ${CI_REGISTRY_IMAGE}:latest


# Check for format warnings on source files
lint:
  stage: lint
  rules:
    - changes:
      - "**/*.typ"
      - .gitlab-ci.yml
  script:
    - echo "Running linter"
    - typstyle --check .
  allow_failure: true

# Build documents
build:
  stage: build
  rules:
    - changes:
      - "**/*.typ"
      - .gitlab-ci.yml
  script:
    - echo "Compiling documents"
    - make all
  artifacts:
    paths:
      - out/
    expire_in: 1 hour
